name: Quality checks

on:
  push:
  pull_request:

jobs:
  repository-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Check public repository contents
        run: python scripts/check_publication.py
      - name: Compile Python source
        run: python -m compileall -q -x 'external/NMR-Predictor-Portable/envs|external/NMR-Predictor-Portable/models' .
